[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=agents
    --cov=security
    --cov-report=html:outputs/14_tests/coverage_html
    --cov-report=term-missing

markers =
    bdd: BDD scenario tests
    unit: Unit tests for individual agent functions
    integration: Integration tests requiring pipeline outputs
    security: Security framework tests
    slow: Slow tests (model training)

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
